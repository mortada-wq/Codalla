# Deploy Codalla to Cloud Run via Cloud Build (cloudbuild.yaml).
#
# Manual-dispatch only until the GCP side is configured — needs Workload
# Identity Federation plus the GCP_PROJECT_ID, GCP_WORKLOAD_IDENTITY_PROVIDER,
# and GCP_SERVICE_ACCOUNT repo secrets (see deploy/gcp/README.md §5). Once
# those exist, uncomment the push trigger for auto-deploys from main.

name: Deploy to Cloud Run

on:
  workflow_dispatch:
  # push:
  #   branches: [main]

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-cloudrun
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Build and deploy via Cloud Build
        run: gcloud builds submit --config cloudbuild.yaml --project "${{ secrets.GCP_PROJECT_ID }}"
