    ApplyFileInput:
      type: object
      required: [path, content]
      properties:
        path:
          type: string
        content:
          type: string

    # ─── Filesystem ────────────────────────────────────────────────────────────
    FileNode:
      type: object
      required: [name, path, type]
      properties:
        name:
          type: string
        path:
          type: string
        type:
          type: string
          enum: [file, directory]
        size:
          type: ["integer", "null"]
        children:
          type: ["array", "null"]
          items:
            $ref: "#/components/schemas/FileNode"

    FileTree:
      type: object
      required: [projectId, nodes]
      properties:
        projectId:
          type: string
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/FileNode"

    FileContent:
      type: object
      required: [path, content]
      properties:
        path:
          type: string
        content:
          type: string
        language:
          type: string
        size:
          type: integer

    FileSave:
      type: object
      required: [path, content]
      properties:
        path:
          type: string
        content:
          type: string

    DirectoryInput:
      type: object
      required: [path]
      properties:
