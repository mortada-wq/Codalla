          type: string
        projectId:
          type: string
        label:
          type: string
        done:
          type: boolean
        sortOrder:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string

    SuccessCriterionInput:
      type: object
      required: [label]
      properties:
        label:
          type: string
        sortOrder:
          type: integer

    SuccessCriterionUpdate:
      type: object
      properties:
        label:
          type: string
        done:
          type: boolean
        sortOrder:
          type: integer

    # ─── Memory Notes ──────────────────────────────────────────────────────────
    MemoryNote:
      type: object
      required: [id, projectId, title, content, createdAt, updatedAt]
      properties:
        id:
          type: string
        projectId:
          type: string
        title:
          type: string
        content:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string

    MemoryNoteInput:
      type: object
      required: [title]
      properties:
