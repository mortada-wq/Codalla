          type: string

    RenameInput:
      type: object
      required: [oldPath, newPath]
      properties:
        oldPath:
          type: string
        newPath:
          type: string

    # ─── GitHub ────────────────────────────────────────────────────────────────
    GithubRepo:
      type: object
      required: [id, name, fullName, cloneUrl, private, defaultBranch]
      properties:
        id:
          type: integer
        name:
          type: string
        fullName:
          type: string
        description:
          type: ["string", "null"]
        cloneUrl:
          type: string
        sshUrl:
